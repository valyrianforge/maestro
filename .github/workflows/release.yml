name: build-and-release

# Builds installers on every push to a v* tag (and on manual dispatch):
#   - macOS  -> Maestro-*.dmg
#   - Windows -> Maestro-*.exe (NSIS installer)
# On a tag push, both are attached to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (no Qt, tests on)
        run: cmake -S . -B build -DMAESTRO_WITH_QT=OFF -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Run tests
        run: ctest --test-dir build --output-on-failure

  package:
    name: Package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.8.3
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Install NSIS (Windows)
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B build
          -DMAESTRO_WITH_QT=ON
          -DMAESTRO_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        shell: bash
        run: cmake --build build --config Release --parallel

      - name: Package DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        working-directory: build
        run: cpack -G DragNDrop -C Release

      - name: Package installer (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: build
        run: cpack -G NSIS -C Release

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          cp build/*.dmg dist/ 2>/dev/null || true
          cp build/*.exe dist/ 2>/dev/null || true
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maestro-${{ matrix.os }}
          path: dist/*

  release:
    name: Publish release
    needs: [test, package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
