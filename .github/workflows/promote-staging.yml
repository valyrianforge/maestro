name: promote-staging

# The "staging -> main, daily" half of the workflow.
#
# Once a day (and on manual dispatch) this:
#   1. checks whether `staging` is ahead of `main`
#   2. re-runs build + tests on staging as a final gate
#   3. fast-forward-safe merges staging into main and pushes
#   4. (optional) tags a dated nightly release, which the release.yml
#      workflow turns into DMG/EXE installers + a GitHub Release
#
# NOTE: scheduled workflows only run from the DEFAULT branch, so this file
# must live on `main` to fire on cron.
#
# NOTE on auto-release: a tag pushed with the built-in GITHUB_TOKEN does NOT
# trigger release.yml (GitHub blocks token-triggered workflow recursion).
# To make the nightly tag auto-build installers, create a repo secret
# RELEASE_PAT (a fine-grained PAT with contents:write) and it will be used
# for the tag push below. Without it, promotion still happens; you just run
# release.yml manually (workflow_dispatch) or push the tag yourself.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      tag_release:
        description: "Tag a nightly release if main advances"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: promote-staging
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Prefer a PAT (if configured) so the pushed tag can trigger release.yml.
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "maestro-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Check whether staging is ahead of main
        id: check
        run: |
          git fetch origin staging main
          AHEAD=$(git rev-list --count origin/main..origin/staging)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "staging is $AHEAD commit(s) ahead of main"

      - name: Build & test staging (final gate)
        if: steps.check.outputs.ahead != '0'
        run: |
          git checkout origin/staging
          cmake -S . -B build -DMAESTRO_WITH_QT=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Merge staging -> main
        if: steps.check.outputs.ahead != '0'
        run: |
          git checkout main
          git merge --no-ff origin/staging -m "chore: promote staging -> main (nightly)"
          git push origin main

      - name: Tag nightly release
        if: >-
          steps.check.outputs.ahead != '0' &&
          (github.event_name == 'schedule' || github.event.inputs.tag_release == 'true')
        run: |
          DATE=$(date +'%Y%m%d')
          TAG="v0.1.0-nightly.$DATE"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping."
          else
            git tag -a "$TAG" -m "Nightly promotion $DATE"
            git push origin "$TAG"
          fi

      - name: Nothing to promote
        if: steps.check.outputs.ahead == '0'
        run: echo "staging is not ahead of main; nothing to do."
